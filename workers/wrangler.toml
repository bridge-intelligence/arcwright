name = "arcwright-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"
APP_URL = "https://arcwright.pages.dev"

# Secrets (set via `wrangler secret put`):
# GOOGLE_CLIENT_ID
# GOOGLE_CLIENT_SECRET
# GITHUB_CLIENT_ID
# GITHUB_CLIENT_SECRET
# JWT_SECRET

[[d1_databases]]
binding = "DB"
database_name = "arcwright-db"
database_id = "414d2eba-2552-49e0-860f-e492c69e2fff"

[ai]
binding = "AI"

# --- Environment overrides ---

[env.production]
vars = { ENVIRONMENT = "production", APP_URL = "https://arcwright.pages.dev" }

[[env.production.d1_databases]]
binding = "DB"
database_name = "arcwright-db"
database_id = "414d2eba-2552-49e0-860f-e492c69e2fff"

[env.production.ai]
binding = "AI"
